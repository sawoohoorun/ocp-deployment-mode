  - id: FB-041
    severity: high
    section: "Section 6.D: UPI Installation Workflow / Section 8: Networking"
    issue: >
      The document does not cover how to configure static IP addresses on UPI nodes.
      In a UPI deployment on OpenStack, the operator controls all network resource
      provisioning. Static IP assignment is a common and important operational
      requirement — particularly for RHOSO, where worker nodes need stable IPs for
      isolated network interfaces. The current UPI workflow and networking sections
      describe Neutron port creation and NMState configuration but do not explain
      how to set a static IP on a node at boot time via Ignition or NMState.
    required_change: >
      Add a dedicated subsection in Section 6.D (UPI workflow) and/or Section 8
      (Networking) covering static IP configuration for UPI nodes. The subsection must:

      1. Explain that in UPI on OpenStack, the operator creates Neutron ports and
         assigns fixed_ips before booting the node. The Nova instance is attached to
         the port with the fixed IP already set in Neutron — primary mechanism for
         static IP on OpenStack-hosted UPI nodes.

      2. Explain the NMState / MachineConfig path for configuring the network interface
         inside the RHCOS node (NodeNetworkConfigurationPolicy or MachineConfig writing
         a NetworkManager keyfile). Required for RHOSO isolated networks.

      3. Describe the Ignition network config path if Red Hat documentation covers it.

      4. Cover all three modes with a comparison note:
         - IPI: installer uses DHCP from Neutron; post-install static addressing via NMState.
         - UPI: operator creates Neutron ports with fixed_ips before booting; additional
           NICs via NMState or MachineConfig post-install.
         - Platform-agnostic: no OpenStack port management; static IPs via NMState,
           MachineConfig, or Ignition network config.

      5. Each method must cite the appropriate Red Hat source or be marked
         "Needs Red Hat source verification."
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-user"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/networking/index"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/machine_configuration/index"
      - "https://docs.redhat.com/en/documentation/red_hat_openstack_services_on_openshift/18.0/html/planning_your_deployment/plan-networks_planning"
    status: resolved
    resolution_note: >
      Section 8.C (Node IP Assignment and Static Addressing) has been added to the document
      after the existing Section 8.B table. The subsection covers:
      (1) IPI on OpenStack: Neutron DHCP is the documented mechanism; the OCP 4.18
      Installation configuration parameters for OpenStack guide states that
      platform.openstack.machinesSubnet must have DHCP enabled, confirmed as Documented.
      (2) UPI on OpenStack: the OCP 4.18 UPI on OpenStack guide documents that the
      operator creates Neutron ports and Nova servers; whether --fixed-ip is used in the
      documented Ansible playbooks is marked Not confirmed and cross-referenced to
      Section 17.
      (3) Platform-agnostic: no OpenStack port management; static IPs configurable via
      NodeNetworkConfigurationPolicy (NMState Operator) or MachineConfig (NetworkManager
      keyfile) post-install, confirmed as Documented; Ignition-level static IP not confirmed
      and cross-referenced to Section 17.
      (4) RHOSO isolated NIC configuration: the RHOSO 18.0 Deploying — Preparing networks
      chapter documents NMState Operator with NodeNetworkConfigurationPolicy using VLAN
      interfaces with static IPv4 addresses for all isolated networks; this applies to all
      three installation modes, confirmed as Documented.
      A comparison table covering initial node IP assignment, RHOSO isolated NIC
      configuration, and static IP mechanism is present with evidence strength labels.
      Three new not-confirmed items have been added to Section 17 for the unresolved
      details. Two new references have been added to Section 18.

