    red_hat_reference: []
    status: open

  - id: FB-034
    severity: high
    section: "Section 6.D: Installation workflows"
    issue: >
      The installation workflows for IPI, UPI, and platform-agnostic are written as
      plain numbered lists. These are hard to follow because the reader cannot see
      the flow of decisions, branching points, or the sequence of responsibility
      (installer vs. operator vs. OpenStack) at a glance.
    required_change: >
      Replace or supplement the numbered workflow lists with Mermaid flowchart diagrams
      for each installation approach. Each diagram should:

      1. Use Mermaid flowchart TD (top-down) syntax so it renders in standard Markdown
         viewers and GitHub.
      2. Show the sequence of major steps as nodes.
      3. Use different node shapes or labels to distinguish who is responsible:
         - Installer (openshift-install) actions
         - Operator / admin manual actions
         - OpenStack API actions (Nova, Neutron, Octavia/external LB, Glance, Cinder)
         - Cluster bootstrap events
      4. Include a decision node where applicable (e.g. "Octavia available?" with
         yes/no branch to external LB path for IPI).
      5. Keep the existing numbered list below the diagram as a detailed reference --
         the diagram is the overview, the list is the detail.

      Example Mermaid structure for IPI:
      ```
      flowchart TD
          A[Prepare clouds.yaml and pull secret] --> B[Run openshift-install create cluster]
          B --> C[Installer: create Neutron network and router]
          C --> D[Installer: upload RHCOS image to Glance]
          D --> E[Installer: provision bootstrap Nova VM]
          E --> F{Octavia available?}
          F -- Yes --> G[Installer: create Octavia LB for API]
          F -- No --> H[Operator: configure external LB for API]
          G --> I[Installer: provision 3 control plane VMs]
          H --> I
          I --> J[Bootstrap cluster forms, etcd starts]
          J --> K[Installer: provision worker VMs]
          K --> L[Bootstrap VM destroyed]
          L --> M[Cluster ready — retrieve kubeconfig]
      ```

      Provide equivalent diagrams for UPI and platform-agnostic workflows.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-user"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_any_platform/installing-platform-agnostic"
    status: open

  - id: FB-035
    severity: high
    section: Entire document
    issue: >
      The document will be used as a reference to build a presentation. In its current
      form it is not structured in a way that maps naturally to slides. Specific problems:

      - There are no clear "one idea per section" boundaries. Most sections mix narrative
        prose, wide tables, and workflow lists in a way that cannot be lifted into a
        slide without heavy reformatting.
      - There are no summary statements or key takeaways that a presenter could use as
        a slide headline or speaker note.
      - Comparison tables have too many columns and rows to fit on a slide.
      - The workflow sections have no visual separators between phases that would map
        to individual slides.
      - There is no dedicated "Key decisions" or "When to choose which approach" section
        that would work as a closing / recommendation slide.
    required_change: >
      Add the following presentation-friendly structural elements throughout the document:

      1. Slide-ready summary box per major section.
         At the end of each major section (Sections 5-15), add a clearly marked block
         titled "Slide summary" containing:
         - A one-line headline (the single most important thing to say on a slide).
         - 3-5 bullet points a presenter could use as slide body text.
         - A suggested slide title.

      2. Split wide comparison tables into per-topic mini-tables.
         Each mini-table should have at most 3-4 rows and fit within 3 columns
         (Aspect | IPI | UPI / Platform-agnostic). These can be copied directly
         onto a single slide.

      3. Add a "Key decisions" section (new Section 19) after the decision checklist.
         This section contains a 3-column table mapping decision criteria to the
         approach that meets that criterion, suitable for a "When to use which" slide.
         Each row must cite a Red Hat source or be marked "Derived from documented workflow."

      4. Add a one-page "At a glance" comparison as Section 1.B (after Executive Summary).
         A single compact table covering the 5-6 most important dimensions (installation
         effort, load balancer, Machine API, CSI, scale-out, upgrade) with simple
         Yes / No / Manual values. This is the "first slide" of any presentation.

      5. Mark workflow diagram phases with slide break hints.
         In each Mermaid diagram (FB-034), add a comment above logical phase boundaries
         (e.g. %% --- Slide break: Bootstrap phase ---) so a presenter knows where one
         slide ends and the next begins.
    red_hat_reference: []
    status: open

reviewer_behavior:
  description: >
    Instructions for how the reviewer agent must conduct each review pass.
    Pattern-matching against rules and templates is the minimum. The reviewer
    must go further on every pass.
  fact_check:
    - >
      For every Red Hat reference URL cited in the document, fetch the page and
      verify that the claim it is cited for is actually supported by that page.
      Do not assume a URL is correct because it was previously accepted.
    - >
      If a URL returns 404 or does not contain the claimed content, flag it as
      a broken or mismatched reference and suggest the correct URL or section.
    - >
      For claims labeled "Documented", confirm the exact wording or concept
      appears in the cited source. Downgrade to "Derived from documented workflow"
      or "Not confirmed" if the source does not directly state it.
  find_alternatives:
    - >
      When a claim is labeled "Not confirmed" or "Needs Red Hat source verification",
      actively search docs.redhat.com for a better source before concluding none exists.
      Try related guides (e.g. if the install guide does not confirm a CSI claim,
      try the Storage guide or the release notes).
    - >
      When a reference is wrong or suboptimal (e.g. FB-026: prerequisites guide cited
      for a storage claim), find and propose the correct specific guide and section
      rather than just flagging the wrong reference.
    - >
      If a documented alternative exists for a capability described as having only
      one option (e.g. FB-031: Octavia presented as the only IPI load balancer),
      find and cite the alternative from Red Hat documentation.
  pattern_check:
    - Scope violations (RHOSO deployment mode wording)
    - Evidence strength label presence and accuracy
    - Opinion-based wording without source backing
    - Version consistency (OCP 4.18, RHOSO 18.0)
    - Required sections present and not stubs

