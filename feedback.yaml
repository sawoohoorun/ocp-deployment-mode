reviewer_behavior:
  description: >
    Instructions for how the reviewer agent must conduct each review pass.
    Pattern-matching against rules and templates is the minimum. The reviewer
    must go further on every pass.
  fact_check:
    - >
      For every Red Hat reference URL cited in the document, fetch the page and
      verify that the claim it is cited for is actually supported by that page.
      Do not assume a URL is correct because it was previously accepted.
    - >
      If a URL returns 404 or does not contain the claimed content, flag it as
      a broken or mismatched reference and suggest the correct URL or section.
    - >
      For claims labeled "Documented", confirm the exact wording or concept
      appears in the cited source. Downgrade to "Derived from documented workflow"
      or "Not confirmed" if the source does not directly state it.
  find_alternatives:
    - >
      When a claim is labeled "Not confirmed" or "Needs Red Hat source verification",
      actively search docs.redhat.com for a better source before concluding none exists.
      Try related guides (e.g. if the install guide does not confirm a CSI claim,
      try the Storage guide or the release notes).
    - >
      When a reference is wrong or suboptimal (e.g. FB-026: prerequisites guide cited
      for a storage claim), find and propose the correct specific guide and section
      rather than just flagging the wrong reference.
    - >
      If a documented alternative exists for a capability described as having only
      one option (e.g. FB-031: Octavia presented as the only IPI load balancer),
      find and cite the alternative from Red Hat documentation.
  pattern_check:
    - Scope violations (RHOSO deployment mode wording)
    - Evidence strength label presence and accuracy
    - Opinion-based wording without source backing
    - Version consistency (OCP 4.18, RHOSO 18.0)
    - Required sections present and not stubs

  - id: FB-041
    severity: high
    section: "Section 6.D: UPI Installation Workflow / Section 8: Networking"
    issue: >
      The document does not cover how to configure static IP addresses on UPI nodes.
      In a UPI deployment on OpenStack, the operator controls all network resource
      provisioning. Static IP assignment is a common and important operational
      requirement — particularly for RHOSO, where worker nodes need stable IPs for
      isolated network interfaces. The current UPI workflow and networking sections
      describe Neutron port creation and NMState configuration but do not explain
      how to set a static IP on a node at boot time via Ignition or NMState.
    required_change: >
      Add a dedicated subsection in Section 6.D (UPI workflow) and/or Section 8
      (Networking) covering static IP configuration for UPI nodes. The subsection must:

      1. Explain that in UPI on OpenStack, the operator creates Neutron ports and
         assigns fixed IPs to those ports before booting the node. The Nova instance
         is attached to the port with the fixed IP already set in Neutron — this is
         the primary mechanism for static IP on OpenStack-hosted UPI nodes.

      2. Explain the NMState / MachineConfig path for configuring the network interface
         inside the RHCOS node (e.g. setting static IP via NMState NodeNetworkConfigurationPolicy
         or via a MachineConfig that writes a NetworkManager keyfile). This is required
         for RHOSO isolated networks where the node needs additional NICs with static IPs
         beyond what Neutron DHCP provides.

      3. Describe the Ignition network config path if Red Hat documentation covers it
         (static IP via Ignition networkd or NM config files in the bootstrap phase).

      4. Cover all three installation modes with a comparison note:
         - IPI: static IPs not directly configurable at install time (installer uses
           DHCP from Neutron); post-install static addressing requires NMState.
         - UPI: operator creates Neutron ports with fixed_ips set before booting;
           additional NICs configured via NMState or MachineConfig post-install.
         - Platform-agnostic: no OpenStack port management; static IPs set entirely
           via NMState, MachineConfig, or Ignition network config.

      5. Each method must cite the appropriate Red Hat source or be marked
         "Needs Red Hat source verification."
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-user"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/networking/index"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/machine_configuration/index"
      - "https://docs.redhat.com/en/documentation/red_hat_openstack_services_on_openshift/18.0/html/planning_your_deployment/plan-networks_planning"
    status: open

