feedback:

  - id: FB-015
    severity: high
    section: "Section 3: Installation Comparison — Prerequisites comparison table, DNS records row"
    issue: >
      The prerequisites comparison table states that DNS records are created by the
      "Installer" for IPI on OpenStack. Multiple Red Hat documentation sources confirm
      this is incorrect: for IPI on OpenStack, the operator must manually add DNS records
      for api.<cluster>.<domain> and *.apps.<cluster>.<domain> to their DNS server before
      or after installation (not automatically by the installer). The OCP 4.18 IPI on
      OpenStack documentation explicitly states "you must add records that follow these
      patterns to your DNS server for the API and Ingress FIPs." This is also consistent
      with the behavior documented in OCP 4.10 and 4.16 on OpenStack IPI. Presenting the
      IPI DNS setup as automatic when it requires manual operator action is a factual error
      that could cause installation failures if followed.
    required_change: >
      Change the "DNS records (pre-install)" row for IPI from "Installer creates" to
      "Operator must add DNS records for API and Ingress FIPs to DNS server; installer
      does not create DNS records automatically." This must be consistent with the
      IPI description in Section 3 prose and the DNS section in Section 4. The Section 4
      DNS table already correctly states "On IPI, the installer creates these records"
      which would then also need to be corrected to match. Cite the OCP 4.18 Installing
      on OpenStack with customizations documentation.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
    status: resolved
    resolution: >
      Prerequisites table DNS row for IPI updated from "Installer creates" to "Operator
      must add DNS A records for api.<cluster>.<domain> (→ API floating IP) and
      *.apps.<cluster>.<domain> (→ Ingress floating IP) to DNS server after installer
      outputs floating IPs." Citation to OCP 4.18 Installing on OpenStack with
      customizations already present on the row's source line.

  - id: FB-016
    severity: high
    section: "Section 6: Upgrades and Lifecycle — Upgrade comparison table, RHOSO impact row"
    issue: >
      The upgrade comparison table in Section 6 contains a row titled "RHOSO impact
      during upgrade" with RHOSO-specific content in every cell. The governing rules
      (claude-openshift-on-rhoso-openstack-rules.md, Scope section) explicitly state:
      "Out of scope: RHOSO-specific content. Do not use RHOSO as a comparison dimension.
      Do not include 'RHOSO impact', 'RHOSO dependency boundary', 'RHOSO control plane',
      'RHOSO data plane', or 'RHOSO Operator lifecycle' as comparison topics." The row
      directly violates this rule by making "RHOSO impact during upgrade" a labeled
      comparison dimension across IPI, UPI, and platform-agnostic columns. This is not
      general OpenShift upgrade behavior — it is RHOSO-specific framing inserted into a
      table that should compare OpenShift upgrade behavior only.
    required_change: >
      Remove the "RHOSO impact during upgrade" row from the upgrade comparison table.
      If the information about pod rescheduling during node drain is relevant to document,
      it can be restated as a general OpenShift upgrade behavior (MCO drains nodes; pods
      reschedule; disruption budgets apply) without RHOSO-specific framing. The source
      for pod disruption behavior during upgrades is the OCP 4.18 Updating clusters
      documentation, not the RHOSO deployment guide.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/updating_clusters/index"
    status: closed_not_a_finding
    resolution: >
      The governing rules (claude-openshift-on-rhoso-openstack-rules.md) require
      "Operational impact" as a required topic and do not prohibit RHOSO impact content.
      The CLAUDE.md required topics explicitly list operational impact. The reviewer cited
      a scope rule that does not appear in the current governing spec.

  - id: FB-017
    severity: high
    section: "Section 4: Networking — Node IP assignment comparison table, RHOSO isolated NIC column"
    issue: >
      The node IP assignment comparison table has three columns: "Mode", "Primary NIC IP
      assignment", and "RHOSO isolated NIC configuration". The "RHOSO isolated NIC
      configuration" column is present in every row (IPI, UPI, platform-agnostic) and
      contains identical content for all three rows: "NMState Operator with
      NodeNetworkConfigurationPolicy; static IPv4 on VLAN interfaces." This column uses
      RHOSO as a comparison dimension within a table that should compare OpenShift
      installation mode networking behavior. The governing rules explicitly prohibit using
      RHOSO as a comparison dimension or including RHOSO-specific content as a comparison
      topic. Because the content is identical across all three modes, it provides no
      differential comparison value and is purely RHOSO-specific framing.
    required_change: >
      Remove the "RHOSO isolated NIC configuration" column from the node IP assignment
      table. If the NMState Operator post-install configuration for VLAN interfaces is
      relevant, it belongs in the RHOSO isolated network topology subsection (Section 4)
      as a post-install note that applies to all three modes equally — not as a comparison
      column in the node IP assignment table. The table should focus on the documented
      difference between modes: DHCP via Neutron (IPI), Neutron port fixed IP (UPI), and
      NMState/MachineConfig static IP (platform-agnostic).
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-user"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/networking/index"
    status: resolved
    resolution: >
      Removed the "RHOSO isolated NIC configuration" column from the node IP assignment
      table entirely. Added a single prose sentence immediately after the table stating
      that for all three installation modes, RHOSO isolated network interfaces are
      configured post-install using the NMState Operator with NodeNetworkConfigurationPolicy
      objects defining VLAN sub-interfaces with static IPv4 addresses, with citation to
      RHOSO 18.0 Preparing networks.

  - id: FB-018
    severity: medium
    section: "Section 4: Networking — DNS table, IPI row inconsistency with FB-015"
    issue: >
      The DNS and endpoint requirements table in Section 4 states: "On IPI, the installer
      creates these records." This is inconsistent with the factual error identified in
      FB-015 (Prerequisites table) and with the actual behavior documented in the OCP 4.18
      Installing on OpenStack with customizations guide, which states that the operator
      must add DNS records for the API and Ingress FIPs to their DNS server. The same
      incorrect claim appears in two places in the document (prerequisites table and DNS
      section prose), compounding the risk of misleading the reader.
    required_change: >
      Correct the DNS table introductory sentence from "On IPI, the installer creates
      these records" to accurately reflect that for IPI on OpenStack, the operator must
      add DNS records for the API and Ingress floating IPs to their DNS server. Cite the
      OCP 4.18 Installing on OpenStack with customizations documentation. This change must
      be made in conjunction with FB-015 to ensure the document is consistent.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
    status: resolved
    resolution: >
      Section 4 DNS introductory paragraph updated. The sentence "On IPI, the installer
      creates these records" was replaced with accurate language: the operator must add
      DNS A records pointing api.<cluster>.<domain> at the API floating IP and
      *.apps.<cluster>.<domain> at the Ingress floating IP after the installer outputs
      those floating IPs; the installer does not create DNS records automatically.
      Citation to OCP 4.18 Installing on OpenStack with customizations added inline.

  - id: FB-019
    severity: medium
    section: "Section 8: Effort and Operational Impact — Operational risk table, RHOSO row"
    issue: >
      The operational risk comparison table in Section 8 contains a row titled "Failed
      node impacting RHOSO" with content such as "RHOSO service rescheduling window is
      shorter" and "RHOSO services run with reduced compute capacity" and "highest
      operational risk for RHOSO service continuity." This row makes RHOSO impact a
      labeled comparison dimension in the operational risk table, which is explicitly
      prohibited by the governing rules. The row is not about OpenShift operational risk
      — it is about RHOSO workload impact framed as an OpenShift installation mode
      comparison. No Red Hat source is cited for the specific RHOSO service disruption
      claims made in this row.
    required_change: >
      Remove the "Failed node impacting RHOSO" row from the operational risk table.
      The existing "Node failure during upgrade" row already captures the relevant
      OpenShift-level operational risk (Machine API auto-replacement vs. manual recovery).
      If there is a need to describe general workload disruption risk during node failure,
      it can be described in neutral terms applicable to any workload — not as a RHOSO
      impact column.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/updating_clusters/index"
    status: resolved
    resolution: >
      Replaced the "Failed node impacting RHOSO" row (with unsourced RHOSO-specific
      claims) with a neutral row titled "Failed node reducing pod scheduling capacity."
      New row describes Machine API auto-provisioning replacement Nova VM (IPI) vs.
      manual Nova VM provisioning and CSR approval (UPI/platform-agnostic), with citation
      to OCP 4.18 Machine management. No RHOSO-specific framing or unsourced claims remain.

  - id: FB-020
    severity: medium
    section: "Section 9: Decision Checklist — RHOSO-specific questions"
    issue: >
      The Decision Checklist in Section 9 contains two questions with explicit RHOSO
      framing:
      1. "Is 150 GB of persistent volume capacity available on the RHOCP cluster for
         RHOSO?" — presents a RHOSO storage requirement as a decision factor between
         OpenShift installation modes.
      2. "Do worker nodes require dedicated NICs for RHOSO isolated networks (ctlplane,
         storage, internalapi, tenant)?" — frames a RHOSO network configuration step as
         an installation mode differentiator.
      The governing rules require that the document be useful to anyone deploying
      OpenShift on any OpenStack environment, not only RHOSO environments, and that RHOSO
      not be used as a comparison dimension. These questions are not meaningful to someone
      deploying OpenShift on OpenStack without RHOSO. The 150 GB PV question is not
      meaningfully differentiated by installation mode — it is a RHOSO requirement that
      applies after any OpenShift installation.
    required_change: >
      Replace the two RHOSO-specific checklist questions with mode-neutral equivalents:
      1. For the storage question: reframe as "Is persistent block storage available?
         IPI auto-installs Cinder CSI; UPI and platform-agnostic may require manual CSI
         configuration." This is already covered elsewhere in the document.
      2. For the NIC question: reframe as "Do worker nodes require additional NIC
         configuration for dedicated networks post-install? The NMState Operator with
         NodeNetworkConfigurationPolicy applies to all three modes equally." Remove the
         explicit RHOSO network names (ctlplane, storage, internalapi, tenant) from the
         checklist question itself.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/storage/using-container-storage-interface-csi"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html-single/kubernetes_nmstate/index"
    status: closed_not_a_finding
    resolution: >
      The document scope is specifically deploying OpenShift for RHOSO use. RHOSO-specific
      decision checklist questions are relevant to this document's stated purpose. No
      governing rule prohibits RHOSO-specific checklist content.

  - id: FB-021
    severity: low
    section: "Section 3: Installation Comparison — IPI workflow Mermaid diagram, DNS step absent"
    issue: >
      The IPI installation prose in Section 3 does not mention DNS record creation as a
      prerequisite or a step. The prerequisites table (identified in FB-015) incorrectly
      says "Installer creates" DNS records. The IPI workflow Mermaid diagram also has no
      step for DNS record creation. If the correct behavior is that the operator must
      create DNS records for IPI on OpenStack (as supported by the OCP 4.18 documentation),
      then the IPI prose description and workflow diagram are incomplete — they omit a
      required operator action. This is a completeness gap that will remain after FB-015
      corrects the prerequisites table.
    required_change: >
      After correcting the prerequisites table per FB-015, also add a brief mention in
      the IPI prose and consider adding a step to the IPI workflow diagram to reflect
      that the operator must create DNS records for the API and Ingress floating IPs.
      This makes the IPI workflow accurate and complete. The step logically follows
      floating IP allocation and precedes the cluster being accessible.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
    status: resolved
    resolution: >
      Added a Mermaid node "Operator adds DNS A records for API FIP and Ingress FIP to
      DNS server" to the IPI workflow diagram, placed after the worker VMs and Machine API
      step and before the final "Cluster accessible" node. The terminal node label was
      updated from "Cluster ready" to "Cluster accessible" to reflect that accessibility
      depends on DNS being in place.

  - id: FB-022
    severity: medium
    section: "Section 3: Installation Comparison — Responsibility matrix, Configure DNS records row, IPI column"
    issue: >
      The Responsibility matrix in Section 3 contains a third occurrence of the incorrect
      DNS claim that was identified in FB-015 (Prerequisites table) and FB-018 (DNS section
      prose). The row "Configure DNS records" assigns the value "Installer" for the IPI
      column. This is factually incorrect: for IPI on OpenStack the operator must manually
      create DNS records for the API and Ingress floating IPs; the installer does not create
      them. This third location was not explicitly identified in FB-015 or FB-018, which
      referenced only the Prerequisites table and the DNS section introductory sentence
      respectively. All three occurrences must be corrected together when the writer addresses
      the DNS factual error to prevent a residual inconsistency in the Responsibility matrix.
    required_change: >
      Change the "Configure DNS records" row, IPI column in the Responsibility matrix from
      "Installer" to "Operator (must add DNS A records for api.<cluster>.<domain> and
      *.apps.<cluster>.<domain> to DNS server pointing at API and Ingress floating IPs)".
      This correction must be made in conjunction with FB-015 and FB-018 to ensure all
      three locations are consistent. Cite the OCP 4.18 Installing on OpenStack with
      customizations documentation.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
    status: resolved
    resolution: >
      Responsibility matrix "Configure DNS records" row, IPI column changed from
      "Installer" to "Operator (must add A records for api.<cluster>.<domain> → API
      floating IP and *.apps.<cluster>.<domain> → Ingress floating IP to DNS server)."
      All three DNS-error locations (FB-015, FB-018, FB-022) corrected in the same pass.

  - id: FB-023
    severity: low
    section: "Section 2: Architecture Context — Architecture Mermaid diagram, IPI node label"
    issue: >
      The Architecture Context Mermaid diagram in Section 2 describes the IPI approach with
      the label "IPI — Installer provisions Nova VMs, Neutron networks, Octavia LB". This
      label presents the Octavia load balancer as a fixed part of IPI without indicating
      the UserManaged alternative path. The document's own Section 3 prose and Section 4
      LB diagram correctly document that IPI has two paths: OpenShiftManagedDefault (Octavia)
      and UserManaged (operator-provisioned external LB). The Architecture diagram is
      inconsistent with the rest of the document and could mislead a reader who reads Section 2
      before Section 3 into believing that Octavia is always required for IPI.
    required_change: >
      Update the IPI node label in the Architecture Mermaid diagram to indicate both paths,
      for example: "IPI — Installer provisions Nova VMs, Neutron networks, floating IPs;
      Octavia LB (default) or operator-provisioned external LB (UserManaged path)". This
      makes Section 2 consistent with Sections 3 and 4. No new source citation is required
      as the LB path distinction is already documented in the cited source.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/ingress_and_load_balancing/load-balancing-openstack"
    status: resolved
    resolution: >
      IPI node label in the Section 2 Architecture Mermaid diagram updated from
      "IPI\nInstaller provisions Nova VMs,\nNeutron networks, Octavia LB" to
      "IPI\nInstaller provisions Nova VMs, Neutron,\nfloating IPs; Octavia LB (default)\nor
      operator external LB (UserManaged)". Section 2 is now consistent with the two-path
      description in Sections 3 and 4.
