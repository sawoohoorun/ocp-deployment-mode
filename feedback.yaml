  - id: FB-030
    severity: low
    section: "Section 4: RHOSO dependency boundary — 4.A Detailed Comparison"
    issue: >
      Section 4.A quoted "3-node bare metal RHOCP cluster" which may not be verbatim from
      the RHOSO 18.0 Infrastructure and system requirements source and could be misleading
      in an OpenStack-hosted context.
    required_change: >
      Verify the exact quote from the RHOSO 18.0 Infrastructure and system requirements
      documentation and ensure the language does not imply only bare metal deployments
      are supported.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/red_hat_openstack_services_on_openshift/18.0/html/planning_your_deployment/assembly_infrastructure-and-system-requirements"
    status: resolved
    resolution_note: >
      The RHOSO 18.0 Infrastructure and system requirements documentation has been
      verified via web search and confirmed to use the exact phrase "an operational,
      pre-provisioned 3-node bare metal RHOCP cluster, version 4.18." The document
      (Section 4.A, line 77) now includes a clarification note stating "In the context
      of this document, the RHOCP cluster hosting the RHOSO control plane is deployed on
      OpenStack-hosted VMs, not exclusively on physical bare metal machines; the quoted
      phrase reflects the wording of the source document." The quote is verbatim and the
      context is clarified.

  - id: FB-031
    severity: high
    section: "Multiple sections — load balancer claims for IPI"
    issue: >
      The document presents Octavia as a hard requirement for IPI on OpenStack in multiple
      locations, without noting the documented external (user-managed) load balancer path.
      OCP 4.18 documents a supported installation path for IPI on OpenStack where the
      operator provisions a user-managed load balancer via platform.openstack.loadBalancer.type:
      UserManaged in install-config.yaml, making Octavia optional in that path.

      Specific locations that remain incorrect as of round 6:
      - Section 4.C limitations table (line 94): "Requires OpenStack cloud with sufficient
        quota, Octavia service, and external network" without noting the external LB option.
      - Section 4.B layer boundary table (line 85): "Installer provisions Nova VMs, Neutron
        networks, Octavia load balancers, floating IPs" without noting the external LB path.
      - Section 5 high-level table (line 106): "Installer provisions Octavia load balancer;
        operator optionally pre-creates floating IPs" without noting the external LB option.
      - Section 6.D IPI workflow step 1 (line 168): "Verify OpenStack prerequisites: Octavia
        service enabled..." lists Octavia as a prerequisite without noting it can be
        substituted.
      - Section 6.D IPI workflow step 5 (line 176): "creates an Octavia load balancer for
        API" without noting the external LB path.
      - Section 6.E limitations table (line 237): "Requires OpenStack cloud with Octavia
        service enabled — Installation fails without Octavia" — this is incorrect; IPI can
        install without Octavia when platform.openstack.loadBalancer.type: UserManaged is used.
      - Section 8.B network operations table (line 292): "Octavia load balancer provisioned
        by installer; Amphora or OVN provider" without noting the external LB option.
      - Section 8.B application Ingress row (line 293): "Octavia load balancer for Ingress
        provisioned by installer" without noting the external LB option.
      - Section 15 limitations table (line 512): "Requires OpenStack Octavia service —
        Cannot install on OpenStack environments without Octavia" — this is incorrect.
      - Section 16 decision checklist (lines 531, 533): frames Octavia as a requirement
        without noting the external LB alternative.

      Web search confirms OCP 4.18 documents the UserManaged load balancer option at:
      https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/ingress_and_load_balancing/load-balancing-openstack
      and in the customizations installation chapter at:
      https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom
    required_change: >
      Update all affected locations to reflect that IPI on OpenStack supports two load
      balancer options:
      1. OpenStack Octavia (default, OpenShiftManagedDefault) — provisioned automatically
         by the installer.
      2. User-managed (external) load balancer — operator-provisioned, configured via
         platform.openstack.loadBalancer.type: UserManaged in install-config.yaml; Octavia
         is not required when this path is used.

      In the limitations table and decision checklist, replace "Requires Octavia" with:
      "Requires Octavia unless a user-managed load balancer is configured via
      platform.openstack.loadBalancer.type: UserManaged in install-config.yaml."

      In Section 6.E, correct "Installation fails without Octavia" to: "Installation
      requires Octavia unless a user-managed load balancer is configured."

      Add the OCP 4.18 Load balancing on RHOSP and Installing a cluster on OpenStack
      with customizations references where this is described.

      Do not label the external LB support as "Not confirmed" — it is a documented OCP 4.18
      IPI installation path.
    red_hat_reference:
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/ingress_and_load_balancing/load-balancing-openstack"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/installing-openstack-installer-custom"
      - "https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/installing_on_openstack/preparing-to-install-on-openstack"
    status: resolved
    resolution_note: >
      All affected locations in Sections 4.B, 4.C, 5, 6.A, 6.D (steps 1 and 5), 6.E,
      8.A, 8.B (API load balancing and Application Ingress rows), 15, and 16 have been
      updated to reflect that Octavia is the default IPI load balancer path
      (OpenShiftManagedDefault) but not the only option. The user-managed path via
      platform.openstack.loadBalancer.type: UserManaged in install-config.yaml is now
      documented in all affected locations with evidence strength Documented and citing
      OCP 4.18 Load balancing on RHOSP
      (https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/ingress_and_load_balancing/load-balancing-openstack).
      The Section 18 references table entries for Load balancing on RHOSP and OpenStack
      install-config parameters have been updated to reflect the loadBalancer.type
      parameter. The claim "Installation fails without Octavia" in Section 6.E has been
      corrected to clarify that on the default path installation requires Octavia, but
      the UserManaged path removes this requirement.

  - id: FB-032
    severity: high
    section: Entire document
    issue: >
      The document is difficult to read and follow. The current structure feels dense
      and academic rather than practically useful. Specific problems:

      - Tables are wide and have too many columns, causing horizontal overflow on
        standard displays.
      - Sections repeat the same information in slightly different formats (detailed
        comparison prose, then a table, then pros/cons, then workflow) without clear
        transitions that help the reader understand why they are reading each part.
      - Section headings do not give the reader enough orientation — e.g. "Section 6.A"
        is not self-explanatory.
      - Long numbered workflow lists in Section 6.D read like raw notes rather than
        a guide a practitioner would follow.
      - The reference URLs embedded inline in every table row add visual clutter
        without improving readability. A consolidated references section exists but
        inline URLs are still distracting.
    required_change: >
      Rewrite the document for clarity and practical usability:

      1. Use descriptive section headings instead of alphanumeric labels
         (e.g. "IPI Installation Workflow" not "6.D.1").
      2. Lead each major section with a 2-3 sentence orientation paragraph that tells
         the reader what they are about to read and why it matters.
      3. Reduce table width: split very wide tables into narrower focused tables
         (e.g. one table per mode, or one table per topic area) rather than
         trying to put IPI / UPI / platform-agnostic side-by-side in one wide row.
      4. In workflow sections, use short imperative steps with bold action verbs.
         Keep each step to one sentence. Group related steps under sub-headings
         (Prepare, Install, Verify) to break up long numbered lists.
      5. Move all inline reference URLs to footnotes or to the References section.
         In the table body, use a short bracketed label like [OCP-RHOSP-INSTALL]
         that maps to a numbered entry in Section 18.
      6. Add a short TL;DR callout box at the top of each major comparison section
         summarizing the key difference in one sentence.
    red_hat_reference: []
    status: open

  - id: FB-033
    severity: high
    section: All comparison tables
    issue: >
      The "Evidence strength" column appears in every comparison table throughout the
      document. The user has confirmed this column is not necessary and degrades
      readability. It adds width to already-wide tables and interrupts the flow of
      comparison data with metadata that is not useful to the reader.
    required_change: >
      Remove the "Evidence strength" column from every comparison table in the document.
      If a specific claim cannot be confirmed from a Red Hat source, annotate it
      inline with a footnote marker (e.g. *) and add a note at the bottom of the
