  - id: FB-039
    severity: medium
    section: "Section 11.E: Block Storage Operations by Category — etcd backup must-have row"
    issue: >
      The etcd backup entry in Section 11.E (must-have table) states:
      "OCP 4.18 backup and restore documentation supports configuring a PVC
      (ReadWriteOnce, dynamically provisioned) as the etcd backup target using a
      CronJob-based recurring backup mechanism."

      This description is factually inaccurate. The OCP 4.18 Backup and Restore
      documentation uses the EtcdBackup custom resource and an etcd-recurring-backups
      CRD with a schedule field (crontab format), managed by the etcd Operator — not a
      raw Kubernetes CronJob object. The document incorrectly characterises the mechanism
      as "CronJob-based."

      Confirmed by web search of the OCP 4.18 backup and restore documentation at
      https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/backup_and_restore/control-plane-backup-and-restore
      which describes the EtcdBackup resource with a pvcName field and an
      etcd-recurring-backups CRD with a spec.etcd.schedule field (crontab syntax)
      and retention policy, all managed by the etcd Operator. No raw CronJob object
      is involved in the documented mechanism.
    required_change: >
      Correct the etcd backup row description in Section 11.E to:
      "OCP 4.18 backup and restore documentation supports configuring a PVC
      (ReadWriteOnce, dynamically provisioned) as the etcd backup target using the
      EtcdBackup custom resource; automated recurring backups are configured via an
      etcd recurring backup CRD with a crontab schedule field and retention policy,
      managed by the etcd Operator."

      Remove the phrase "CronJob-based recurring backup mechanism" from the row.
      Update the Red Hat reference for this row from [OCP 4.18 Backup and restore —
      Control plane backup and restore] to the specific URL:
      https://docs.redhat.com/en/documentation/openshift_container_platform/4.18/html/backup_and_restore/control-plane-backup-and-restore
    red_hat_reference:
